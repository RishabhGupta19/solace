<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="color-scheme" content="light">
  <meta name="supported-color-schemes" content="light">
</head>

<body style="
  margin:0;
  padding:0;
  background:#f5f1ec;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  color-scheme: light;
">

  <div style="width:100%; padding:40px 12px; box-sizing:border-box;">

    <!-- MAIN CARD -->
    <div style="
      max-width:380px;
      width:100%;
      margin:auto;
      background:#ede6df;
      border-radius:18px;
      padding:28px 22px;
      border:1px solid #e0d6cc;
      box-shadow:0 6px 18px rgba(0,0,0,0.04);
      box-sizing:border-box;
      color:#3b2f2f;
      color-scheme: light;
    ">

      <!-- HEADER -->
      <div style="text-align:center; margin-bottom:28px;">
        <h1 style="
          margin:0;
          font-size:30px;
          font-weight:700;
          color:#3b2f2f;
        ">
          Solace
        </h1>

        <p style="
          margin-top:6px;
          font-size:13px;
          color:#8b6f5a;
        ">
          A space just for the two of you.
        </p>
      </div>

      <!-- LABEL -->
      <div style="margin-bottom:6px;">
        <span style="
          font-size:12px;
          color:#3b2f2f;
          font-weight:500;
        ">
          OTP Code
        </span>
      </div>

      <!-- OTP BOX -->
      <div style="
        width:100%;
        padding:14px;
        border-radius:14px;
        background:#f6f1eb;
        border:1px solid #d6c8bb;
        font-size:22px;
        letter-spacing:4px;
        font-weight:600;
        color:#3b2f2f;
        text-align:center;
        box-sizing:border-box;
      ">
        {{ otp }}
      </div>

      <!-- INFO -->
      <p style="
        margin-top:12px;
        font-size:12px;
        color:#8b6f5a;
        text-align:right;
      ">
        Valid for 10 minutes
      </p>

      <!-- BUTTON -->
      <!-- <div style="margin-top:22px; text-align:center;">
        <div style="
          width:100%;
          padding:14px 0;
          background:#c08a63;
          color:#ffffff;
          border-radius:999px;
          font-size:14px;
          font-weight:500;
          display:inline-block;
        ">
          Verify OTP
        </div>
      </div> -->

      <!-- FOOTER TEXT -->
      <p style="
        margin-top:20px;
        font-size:11px;
        color:#a38b78;
        text-align:center;
      ">
        Didn’t request this? You can ignore this email.
      </p>

    </div>

    <!-- BOTTOM FOOTER -->
    <div style="
      text-align:center;
      margin-top:18px;
      font-size:11px;
      color:#a38b78;
    ">
      © {{ year }} Solace
    </div>

  </div>

</body>
</html>
